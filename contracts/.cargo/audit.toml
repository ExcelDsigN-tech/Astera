[advisories]
# Add advisory IDs to ignore only with a documented reason, e.g.:
# ignore = [
#   # RUSTSEC-2023-XXXX: Not applicable because we don't use the affected feature
#   "RUSTSEC-2023-XXXX",
# ]
ignore = []

[output]
# "vulnerability" always causes failure (built-in, cannot be overridden).
# Additionally deny unmaintained and unsound crates.
deny = ["unmaintained", "unsound"]
quiet = false
